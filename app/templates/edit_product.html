{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Edit Product</h2>
<form method="post" class="card form-grid">
  <label>Name <input name="name" value="{{ product.name }}" required></label>
  <label>Category <input name="category" value="{{ product.category }}"></label>
  <label>Cost Price <input name="cost_price" type="number" min="0" step="0.01" value="{{ product.cost_price }}" required></label>
  <label>Sale Price <input name="sale_price" type="number" min="0" step="0.01" value="{{ product.sale_price }}" required></label>
  <label>Quantity <input name="quantity" type="number" min="0" step="1" value="{{ product.quantity }}" required></label>
  <label>Low Stock Limit <input name="low_stock_limit" type="number" min="1" step="1" value="{{ product.low_stock_limit }}" required></label>
  <button type="submit">Save Changes</button>
</form>
{% endblock %}
